<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>reCAPTCHA 再現</title>
    <style>
        body { font-family: Roboto, sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; user-select: none; }
        .rc-anchor { background: #f9f9f9; border: 1px solid #d3d3d3; border-radius: 3px; box-shadow: 0 0 4px rgba(0,0,0,0.08); width: 302px; height: 76px; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; box-sizing: border-box; position: relative; }
        .rc-anchor-content { display: flex; align-items: center; height: 100%; }
        .rc-inline-block { width: 28px; height: 28px; margin-right: 12px; position: relative; cursor: pointer; }
        .rc-anchor-checkbox { width: 100%; height: 100%; border: 2px solid #c1c1c1; background: #fff; border-radius: 2px; box-sizing: border-box; }
        .rc-loading { display: none; position: absolute; top: 0; left: 0; width: 28px; height: 28px; border: 3px solid #4a90e2; border-top-color: transparent; border-radius: 50%; box-sizing: border-box; animation: spin 0.8s linear infinite; }
        .rc-checkmark { display: none; position: absolute; top: -2px; left: 5px; width: 12px; height: 22px; border: solid #00aa4e; border-width: 0 4px 4px 0; transform: rotate(45deg); }
        .rc-anchor-text { font-size: 14px; color: #2b2b2b; }
        .rc-anchor-logo-portrait { display: flex; flex-direction: column; align-items: center; width: 58px; font-size: 8px; color: #555; text-align: center; font-weight: bold; line-height: 1.2; }
        .rc-anchor-logo-img { width: 32px; height: 32px; background: url('logo_48.png') no-repeat; background-size: 32px; margin-bottom: 2px; }
        .captcha-panel { display: none; position: absolute; top: 90px; left: 0; width: 302px; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 1px solid #dfdfdf; padding: 7px; box-sizing: border-box; z-index: 100; }
        .captcha-header { background: #4a90e2; color: #fff; padding: 16px; margin: -7px -7px 7px -7px; }
        .captcha-header p { margin: 0; font-size: 13px; line-height: 1.3; }
        .captcha-header h3 { margin: 5px 0 0 0; font-size: 24px; font-weight: 900; }
        .captcha-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; background: #dfdfdf; width: 100%; box-sizing: border-box; }
        .captcha-item { position: relative; aspect-ratio: 1/1; cursor: pointer; background: #f0f0f0; display: flex; justify-content: center; align-items: center; font-size: 32px; box-sizing: border-box; border: 2px solid transparent; overflow: hidden; }
        .captcha-item.selected { border: 2px solid #4a90e2; }
        .captcha-item.selected::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.4); transform: scale(0.85); }
        .captcha-item.selected::after { content: "✓"; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; background: #4a90e2; color: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 11px; font-weight: bold; }
        .captcha-footer { display: flex; justify-content: space-between; align-items: center; padding: 10px 4px 2px 4px; margin-top: 4px; border-top: 1px solid #dfdfdf; }
        .footer-icons span { cursor: pointer; margin-right: 12px; font-size: 18px; }
        .verify-btn { background: #4a90e2; color: #fff; border: none; padding: 10px 20px; font-size: 14px; font-weight: bold; cursor: pointer; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="rc-anchor">
    <div class="rc-anchor-content">
        <div class="rc-inline-block" id="captchaBox">
            <div class="rc-anchor-checkbox" id="checkboxBorder"></div>
            <div class="rc-loading" id="loadingCircle"></div>
            <div class="rc-checkmark" id="checkmark"></div>
        </div>
        <div class="rc-anchor-text">私はロボットではありません</div>
    </div>
    <div class="rc-anchor-logo-portrait"><div class="rc-anchor-logo-img"></div>reCAPTCHA</div>

    <div class="captcha-panel" id="captchaPanel">
        <div class="captcha-header"><p id="taskDesc">の画像が写っているタイルをすべて選択してください</p><h3 id="targetTask">信号機</h3></div>
        <div class="captcha-grid" id="captchaGrid"></div>
        <div class="captcha-footer"><div class="footer-icons"><span id="reloadBtn">🔄</span><span id="audioBtn">🎧</span><span id="infoBtn">ℹ️</span></div><button class="verify-btn" id="verifyBtn">確認</button></div>
    </div>
</div>

<script>
    let step = 1, isRun = false;
    const data = {
        1: { t: "信号機", d: "の画像が写っているタイルをすべて選択してください", i: [{e:"🚦",c:true},{e:"🚗",c:false},{e:"🚶",c:false},{e:"🏠",c:false},{e:"🚦",c:true},{e:"🚏",c:false},{e:"🌳",c:false},{e:"🚦",c:true},{e:"🚲",c:false}] },
        2: { t: "扇風機", d: "の画像（強風）が写っているタイルをすべて選択してください", i: [{e:"📺",c:false},{e:"🌪️",c:true},{e:"🛋️",c:false},{e:"🌪️",c:true},{e:"🪑",c:false},{e:"⏰",c:false},{e:"💻",c:false},{e:"💡",c:false},{e:"🌪️",c:true}] },
        3: { t: "信号機(激ムズ)", d: "信号機が含まれるタイルを選択。ない場合は[スキップ]…ではなく、端に1ミリだけかすっているタイルもすべて見つけてください", i: [{e:"🚗",c:false},{e:"🏠",c:false},{e:"🚦",c:true,p:"tr"},{e:"🌳",c:false},{e:"🔍",c:false},{e:"🚦",c:true,p:"r"},{e:"🚲",c:false},{e:"🚶",c:false},{e:"🚦",c:true,p:"b"}] }
    };
    const box = document.getElementById('captchaBox'), border = document.getElementById('checkboxBorder'), load = document.getElementById('loadingCircle'), mark = document.getElementById('checkmark'), panel = document.getElementById('captchaPanel'), task = document.getElementById('targetTask'), desc = document.getElementById('taskDesc'), grid = document.getElementById('captchaGrid'), btn = document.getElementById('verifyBtn'), info = document.getElementById('infoBtn'), reload = document.getElementById('reloadBtn'), audio = document.getElementById('audioBtn');

    function showGrid(s) {
        grid.innerHTML = ""; task.textContent = data[s].t; desc.textContent = data[s].d;
        data[s].i.forEach(item => {
            const div = document.createElement('div'); div.className = 'captcha-item'; div.setAttribute('data-c', item.c);
            if(s===3 && item.c) {
                div.style.fontSize = "16px";
                if(item.p==="tr") { div.style.justifyContent = "flex-end"; div.style.alignItems = "flex-start"; }
                if(item.p==="r") { div.style.justifyContent = "flex-end"; div.style.alignItems = "center"; }
                if(item.p==="b") { div.style.justifyContent = "center"; div.style.alignItems = "flex-end"; }
            }
            div.textContent = item.e; div.onclick = () => div.classList.toggle('selected'); grid.appendChild(div);
        });
    }
    box.onclick = () => {
        if (isRun || step > 3) return; isRun = true; border.style.display = 'none'; load.style.display = 'block';
        setTimeout(() => { load.style.display = 'none'; border.style.display = 'block'; showGrid(step); panel.style.display = 'block'; isRun = false; }, 800);
    };
    reload.onclick = () => { alert("問題を新しく読み直します。\n選択状況がリセットされ、ステージ1に戻ります。"); step = 1; showGrid(1); };
    audio.onclick = () => { alert("音声認証モードに切り替えます。\n…が、現在スピーカーのロボット判定AIが故障中のため、ブラウザの音声機能を利用できません。タイルを選択してください。"); };
    info.onclick = () => { alert("これはGoogleの悪意あるbotから守るプログラムの再現です、あなたがbotではないならタイルをクリックしてください"); };
    btn.onclick = () => {
        let ok = true;
        document.querySelectorAll('.captcha-item').forEach(item => {
            if (item.classList.contains('selected') !== (item.getAttribute('data-c') === 'true')) ok = false;
        });
        if (!ok) { alert("間違っています"); location.reload(); return; }
        if (step < 3) { step++; showGrid(step); } 
        else {
            panel.style.display = 'none'; border.style.display = 'none'; load.style.display = 'block';
            const wait = Math.floor(Math.random() * 3001) + 2000;
            setTimeout(() => {
                load.style.display = 'none'; mark.style.display = 'block';
                alert("検証完了。ページを再読み込みします。"); location.reload();
            }, wait);
        }
    };
</script>

</body>
</html>
